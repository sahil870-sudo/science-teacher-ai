<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 AI Science Teacher</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 90vh; }
        .chat-container { width: 100%; max-width: 600px; height: 80vh; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #3498db, #2c3e50); color: white; padding: 20px; text-align: center; }
        .chat-header h1 { margin: 0; font-size: 22px; }
        .chat-header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9fbfd; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user-message { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background: #eaeff5; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #e6ebf1; display: flex; gap: 10px; }
        textarea { flex: 1; height: 44px; padding: 12px; border: 1px solid #ced4da; border-radius: 22px; resize: none; outline: none; font-size: 15px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 0 25px; border-radius: 22px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>🔬 Your AI Science Teacher</h1>
        <p>বিজ্ঞানের যেকোনো কঠিন কনসেপ্ট জিজ্ঞেস করো, একদম সহজ বাংলায় বুঝিয়ে দেব।</p>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai-message">হ্যালো! আমি তোমার বিজ্ঞানের শিক্ষক। আজ তুমি বিজ্ঞানের কোন টপিকটি সহজে বুঝতে চাও? যেকোনো কিছু জিজ্ঞেস করতে পারো!</div>
    </div>
    
    <div class="chat-input-area">
        <textarea id="userInput" placeholder="এখানে তোমার প্রশ্নটি লেখো..."></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const inputField = document.getElementById('userInput');
    const messageText = inputField.value.trim();
    if (!messageText) return;

    inputField.value = '';
    appendMessage(messageText, 'user-message');

    const loaderId = appendMessage('Teacher is thinking... 🧠', 'ai-message');

    // এআই-কে ভালো রেসপন্স দেওয়ার জন্য প্রম্পট ইঞ্জিনিয়ারিং
    const systemPrompt = "You are a friendly and expert AI Science Teacher. Explain the user's topic step by step with easy real-life analogies. Keep the language very simple, clear and engaging. Always write a detailed and complete response in natural Bengali language. Do not leave the answer incomplete.";
    
    const fullPrompt = `${systemPrompt}\n\nUser Question: ${messageText}`;

    try {
        // ফ্রি রিয়েল-টাইম টেক্সট জেনারেটর যা CORS এরর ছাড়াই কাজ করে
        const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`);
        
        if (!response.ok) throw new Error("Network error");
        
        const data = await response.text();
        document.getElementById(loaderId).remove();

        if (data && data.trim().length > 0) {
            appendMessage(data.trim(), 'ai-message');
        } else {
            throw new Error("Empty data");
        }
    } catch (error) {
        document.getElementById(loaderId).remove();
        // সিকিউর ব্যাকআপ রেসপন্স
        appendMessage(`💡 [AI Teacher]: "${messageText}" সম্পর্কে সহজ কথায় বলতে গেলে:\n\nবিজ্ঞানের এই বিষয়টি খুবই চমৎকার! এটি মূলত আমাদের প্রকৃতির একটি সুন্দর নিয়ম। নেটওয়ার্ক লোডের কারণে রিয়েল-টাইম চ্যাটে সমস্যা হলে তুমি সরাসরি huggingface.co/chat ওপেন করে এই প্রশ্নটি সার্চ করতে পারো, সেখানে আরও দ্রুত লাইভ উত্তর পেয়ে যাবে।`, 'ai-message');
    }
}

function appendMessage(text, className) {
    const chatMessages = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    const id = 'msg-' + Date.now();
    messageDiv.id = id;
    messageDiv.className = `message ${className}`;
    messageDiv.innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return id;
}
</script>

</body>
</html>
