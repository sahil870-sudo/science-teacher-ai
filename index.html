<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 AI Science Teacher</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 90vh; }
        .chat-container { width: 100%; max-width: 600px; height: 80vh; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #3498db, #2c3e50); color: white; padding: 20px; text-align: center; }
        .chat-header h1 { margin: 0; font-size: 22px; }
        .chat-header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9fbfd; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user-message { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background: #eaeff5; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #e6ebf1; display: flex; gap: 10px; }
        textarea { flex: 1; height: 44px; padding: 12px; border: 1px solid #ced4da; border-radius: 22px; resize: none; outline: none; font-size: 15px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 0 25px; border-radius: 22px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>🔬 Your AI Science Teacher</h1>
        <p>বিজ্ঞানের যেকোনো কঠিন কনসেপ্ট জিজ্ঞেস করো, একদম সহজ বাংলায় বুঝিয়ে দেব।</p>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai-message">হ্যালো! আমি তোমার বিজ্ঞানের শিক্ষক। আজ তুমি কোন টপিকটি সহজে বুঝতে চাও? (যেমন: Inertia বা জড়তা কী?)</div>
    </div>
    
    <div class="chat-input-area">
        <textarea id="userInput" placeholder="এখানে তোমার প্রশ্নটি লেখো..."></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// খাঁটি বাংলায় বিজ্ঞানের বড় ও বিস্তারিত ডেটাবেস লজিক
const scienceLessons = {
    "inertia": `💡 **জড়তা বা Inertia কী? সহজ ভাষায় শিখে নাও:**\n\nজড়তা হলো পদার্থের এমন একটা 'অলস' ধর্ম বা স্বভাব, যার কারণে কোনো বস্তু যে অবস্থায় আছে, সে অবিকল সেই অবস্থাতেই থাকতে চায়। যদি কোনো বস্তু স্থির থাকে, তবে সে আজীবন স্থিরই থাকতে চাইবে। আর যদি কোনো বস্তু চলতে থাকে, তবে সে আজীবন একই গতিতে চলতেই চাইবে!\n\n**বাস্তব জীবনের দারুণ উদাহরণ:**\n১. **বাসের ব্রেক:** তুমি যখন কোনো বাসে বসে আছো এবং বাসটি হঠাৎ কষে ব্রেক করলো, তখন তোমার শরীর সামনের দিকে ঝুঁকে পড়ে। কেন জানো? কারণ বাসের সাথে তোমার শরীরের নিচের অংশ থেমে গেলেও, জড়তার কারণে তোমার শরীরের ওপরের অংশ আগের মতোই চলতে চায়!\n২. **ক্যারম বোর্ড:** ক্যারম খেলার সময় যখন তুমি স্ট্রাইকার দিয়ে একদম নিচের ঘুঁটিটাকে জোরে আঘাত করো, তখন শুধু নিচের ঘুঁটিটাই ছিটকে বেরিয়ে যায়, কিন্তু ওপরের বাকি ঘুঁটিগুলো সোজা নিচে নেমে আসে। এটাও জড়তার কারণেই হয়।\n\nজড়তা মূলত দুই প্রকার: স্থিতি জড়তা (স্থির থাকার ইচ্ছা) এবং গতি জড়তা (চলতে থাকার ইচ্ছা)।`,
    
    "gravity": `💡 **মহাকর্ষ বা Gravity কী? সহজ ভাষায় শিখে নাও:**\n\nমহাকর্ষ হলো এই মহাবিশ্বের যেকোনো দুটি বস্তুর মধ্যকার পারস্পরিক আকর্ষণ বল। সহজ কথায়, এই পৃথিবীর প্রতিটি জিনিস একে অপরকে নিজের দিকে টানছে বা আকর্ষণ করছে। এই টানকেই বলা হয় মহাকর্ষ। আর পৃথিবী যখন কোনো বস্তুকে তার নিজের কেন্দ্রের দিকে টানে, তখন সেটাকে আমরা বলি অভিকর্ষ।\n\n**বাস্তব জীবনের দারুণ উদাহরণ:**\n১. **গাছ থেকে ফল পড়া:** নিউটন যখন গাছের নিচে বসে ছিলেন, তখন একটি আপেল সোজা নিচে এসে পড়েছিল, আকাশে উড়ে যায়নি। কারণ পৃথিবী আপেলটিকে তার নিজের দিকে টেনে নিয়েছিল।\n২. **লাফ দিলে নিচে নামা:** তুমি যখন ওপরের দিকে অনেক জোরে লাফ দাও, তুমি কিন্তু আকাশে ভেসে থাকো না, আবার মাটিতেই ফিরে আসো। এটা পৃথিবীর গ্র্যাভিটির কারণেই ঘটে।`,
    
    "default": `💡 **শিক্ষকের উত্তর:**\n\nবিজ্ঞানের এই বিষয়টি খুবই চমৎকার! এটি মূলত আমাদের চারপাশের বাস্তব নিয়মের সাথে সম্পর্কিত। এই বিষয়টি একদম সহজ বাংলায় রিয়েল-টাইমে আরও বিস্তারিত জানতে এবং এআই-এর সাথে সরাসরি লাইভ প্রশ্ন-উত্তর করতে ব্রাউজারের অন্য ট্যাবে huggingface.co/chat ওপেন করে 'Science Teacher' লিখেও সার্চ করতে পারো! সেখানে সম্পূর্ণ লাইভ চ্যাট সাপোর্ট পেয়ে যাবে।`
};

function sendMessage() {
    const inputField = document.getElementById('userInput');
    const messageText = inputField.value.trim().toLowerCase();
    if (!messageText) return;

    inputField.value = '';
    appendMessage(messageText, 'user-message');

    const loaderId = appendMessage('Teacher is thinking... 🧠', 'ai-message');

    // ইনস্ট্যান্ট রেসপন্স জেনারেটর
    setTimeout(() => {
        document.getElementById(loaderId).remove();
        
        let reply = scienceLessons["default"];
        
        // কী-ওয়ার্ড ম্যাচিং টেস্ট
        if (messageText.includes("inertia") || messageText.includes("জড়তা") || messageText.includes("jorota")) {
            reply = scienceLessons["inertia"];
        } else if (messageText.includes("gravity") || messageText.includes("মহাকর্ষ") || messageText.includes("mohakorsho")) {
            reply = scienceLessons["gravity"];
        }
        
        appendMessage(reply, 'ai-message');
    }, 800);
}

function appendMessage(text, className) {
    const chatMessages = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    const id = 'msg-' + Date.now();
    messageDiv.id = id;
    messageDiv.className = `message ${className}`;
    messageDiv.innerHTML = text.replace(/\n/g, "<br>");
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return id;
}
</script>

</body>
</html>
